name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck bin/stripkit lib/*.sh install.sh uninstall.sh
